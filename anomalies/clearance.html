<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GSC | CLEARANCE REQUIRED</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #060c12;
      --panel:      #0b1520;
      --border:     #1a2a3a;
      --border2:    #1f3048;
      --blue:       #2f6acd;
      --blue-dim:   #1e3f7a;
      --blue-glow:  rgba(47,106,205,0.2);
      --text:       #c8d8ea;
      --text-dim:   #5a7a9a;
      --text-faint: #2e4a62;
      --red:        #e05252;
      --red-dim:    rgba(224,82,82,0.15);
      --green:      #3ddc84;
      --green-dim:  rgba(61,220,132,0.15);
      --mono:       'Share Tech Mono', monospace;
      --cond:       'Barlow Condensed', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

    /* Scanlines */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 999;
    }

    /* Ambient radial */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(47,106,205,0.04) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* ── LAYOUT ── */
    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: 60px; height: 60px;
      border-color: var(--border2);
      border-style: solid;
      opacity: 0.5;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 20px; right: 20px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 1px 1px 0; }

    /* Scrolling background text */
    .bg-text {
      position: fixed; inset: 0;
      overflow: hidden; pointer-events: none; z-index: 0;
      opacity: 0.025;
      font-size: 11px; line-height: 1.6; letter-spacing: 2px;
      color: var(--blue);
      word-break: break-all;
      padding: 10px;
      animation: bgscroll 40s linear infinite;
    }
    @keyframes bgscroll {
      from { transform: translateY(0); }
      to   { transform: translateY(-50%); }
    }

    /* ── MAIN CARD ── */
    .card {
      width: 100%;
      max-width: 500px;
      border: 1px solid var(--border2);
      background: var(--panel);
      position: relative;
      z-index: 2;
      animation: cardin 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardin {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Glowing top border */
    .card::before {
      content: '';
      position: absolute; top: -1px; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    /* Card header */
    .card-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .lock-icon {
      width: 44px; height: 44px;
      border: 2px solid rgba(224,82,82,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      position: relative;
    }
    .lock-icon::before {
      content: '';
      width: 14px; height: 12px;
      border: 2px solid var(--red);
      border-radius: 2px;
      display: block;
    }
    .lock-icon::after {
      content: '';
      position: absolute;
      top: 8px;
      width: 8px; height: 8px;
      border: 2px solid var(--red);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
    }
    .lock-icon-ring {
      position: absolute; inset: -6px;
      border: 1px solid rgba(224,82,82,0.15);
      border-radius: 50%;
      animation: ring-pulse 2s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { transform: scale(1);   opacity: 0.5; }
      50%      { transform: scale(1.1); opacity: 0.1; }
    }

    .card-header h1 {
      font-family: var(--cond);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 5px;
      color: var(--red);
      margin-bottom: 6px;
    }

    .card-header .sub {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-faint);
    }

    /* Entity info strip */
    .entity-strip {
      background: #070e16;
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 2px;
    }
    .entity-strip .eid { color: var(--text-dim); }
    .entity-strip .eclr { color: rgba(224,82,82,0.7); }

    /* Card body */
    .card-body { padding: 28px; }

    .field-label {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-faint);
      margin-bottom: 10px;
    }

    /* Input */
    .input-wrap { position: relative; margin-bottom: 16px; }
    .code-input {
      width: 100%;
      background: #070e16;
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: 6px;
      padding: 14px 16px;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    .code-input::placeholder { color: var(--text-faint); letter-spacing: 4px; font-size: 13px; }
    .code-input:focus { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue-dim), inset 0 0 12px rgba(47,106,205,0.04); }
    .code-input.error { border-color: var(--red); box-shadow: 0 0 0 1px rgba(224,82,82,0.3); animation: shake 0.4s ease; }
    .code-input.success { border-color: var(--green); box-shadow: 0 0 0 1px rgba(61,220,132,0.3); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      padding: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--blue-glow);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { border-color: var(--blue); color: var(--text); }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:active { transform: scale(0.99); }

    /* Status message */
    .status-msg {
      margin-top: 16px;
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 2px;
      text-align: center;
      display: none;
      animation: fadein 0.3s ease both;
    }
    .status-msg.denied {
      background: var(--red-dim);
      border: 1px solid rgba(224,82,82,0.3);
      color: var(--red);
      display: block;
    }
    .status-msg.granted {
      background: var(--green-dim);
      border: 1px solid rgba(61,220,132,0.3);
      color: var(--green);
      display: block;
    }

    /* Attempt counter */
    .attempt-info {
      margin-top: 14px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-faint);
      text-align: center;
    }
    .attempt-info .attempts-val { color: var(--red); }

    /* Progress bar (for redirect countdown) */
    .redirect-bar {
      height: 2px;
      background: var(--border);
      margin-top: 16px;
      display: none;
      position: relative;
      overflow: hidden;
    }
    .redirect-bar.active { display: block; }
    .redirect-bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--green);
      width: 0%;
      transition: width linear;
      box-shadow: 0 0 6px var(--green);
    }

    /* Card footer */
    .card-footer {
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      background: #070e16;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
    }

    /* Bottom status bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 8px 28px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-faint);
      display: flex;
      justify-content: space-between;
      z-index: 10;
    }

    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    ::-webkit-scrollbar { display: none; }

    @media (max-width: 500px) {
      .card { margin: 0 8px; }
      .card-body { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- Background scrolling text for atmosphere -->
<div class="bg-text" id="bgText"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="shell">
  <div class="card">

    <div class="card-header">
      <div class="lock-icon">
        <div class="lock-icon-ring"></div>
      </div>
      <h1>ACCESS RESTRICTED</h1>
      <div class="sub">TIER-3 CLEARANCE REQUIRED TO PROCEED</div>
    </div>

    <div class="entity-strip">
      <span class="eid" id="entityIdStrip">ENTITY: UNKNOWN</span>
      <span class="eclr">CLEARANCE: TIER-3</span>
    </div>

    <div class="card-body">
      <div class="field-label">ENTER CLEARANCE CODE</div>

      <div class="input-wrap">
        <input
          class="code-input"
          id="codeInput"
          type="text"
          placeholder="· · · · · · · ·"
          maxlength="16"
          autocomplete="off"
          spellcheck="false"
        >
      </div>

      <button class="submit-btn" id="submitBtn" onclick="checkCode()">
        SUBMIT FOR VERIFICATION
      </button>

      <div class="status-msg" id="statusMsg"></div>

      <div class="redirect-bar" id="redirectBar">
        <div class="redirect-bar-fill" id="redirectFill"></div>
      </div>

      <div class="attempt-info">
        FAILED ATTEMPTS THIS SESSION: <span class="attempts-val" id="attemptCount">0</span>
        &nbsp;|&nbsp; ALL ACCESS ATTEMPTS ARE LOGGED
      </div>
    </div>

    <div class="card-footer">
      <span id="sessionStamp">SESSION: --</span>
      <span id="clockStamp">--</span>
    </div>

  </div>
</div>

<div class="bottom-bar">
  <span>GSC INTERNAL NETWORK // SECURE NODE INT-04</span>
  <span id="bottomTime">--</span>
</div>

<!-- ==========================================================
  CLEARANCE CODES — Edit this section to manage access.

  Each entry maps an entity ID to:
    code:     the secret code players must enter (case-insensitive)
    redirect: the entity page to send them to after access granted

  HOW TO ADD A NEW ENTITY CODE:
  Copy one block and paste it inside CLEARANCE_CODES, separated by a comma.

  HOW PLAYERS REACH THIS PAGE:
  In your anomalies/index.html, set the restricted entity's href to:
    "clearance.html?id=GSC-AX01"
  The ?id= tells this page which entity is being accessed.
=========================================================== -->
<script>
const CLEARANCE_CODES = {
  "GSC-CT01": {
    code:     "WATCHWORD",          // ← EDIT: the secret code for this entity
    redirect: "entity-001.html",   // ← EDIT: where to send player after correct code
  },
  "GSC-AX02": {
    code:     "BLACKSITE",          // ← EDIT
    redirect: "entity-template.html",
  },
  "GSC-AX03": {
    code:     "HOLLOWMEN",          // ← EDIT
    redirect: "entity-03.html",
  },
  // ── ADD NEW ENTITY CODES BELOW ──────────────────────────
  // "GSC-AX04": {
  //   code:     "YOURCODEHERE",
  //   redirect: "entity-004.html",
  // },
};

// ── Read entity ID from URL ?id= param ───────────────────
const params   = new URLSearchParams(window.location.search);
const entityId = (params.get('id') || '').toUpperCase();
const entry    = CLEARANCE_CODES[entityId] || null;

document.getElementById('entityIdStrip').textContent =
  entityId ? `ENTITY: ${entityId}` : 'ENTITY: UNSPECIFIED';

// ── Attempt counter ───────────────────────────────────────
let attempts = 0;

function checkCode() {
  const input    = document.getElementById('codeInput');
  const msg      = document.getElementById('statusMsg');
  const typed    = input.value.trim().toUpperCase();

  if (!typed) return;

  // No entry found for this ID
  if (!entry) {
    showDenied(msg, input, 'ENTITY NOT RECOGNIZED IN DATABASE');
    return;
  }

  if (typed === entry.code.toUpperCase()) {
    showGranted(msg, input, entry.redirect);
  } else {
    attempts++;
    document.getElementById('attemptCount').textContent = attempts;
    const msgs = [
      'CLEARANCE CODE REJECTED — ACCESS DENIED',
      'INVALID CODE — ATTEMPT LOGGED',
      'AUTHORIZATION FAILURE — SESSION FLAGGED',
      'INCORRECT CODE — SECURITY NOTIFIED',
    ];
    showDenied(msg, input, msgs[Math.min(attempts - 1, msgs.length - 1)]);
  }
}

function showDenied(msg, input, text) {
  msg.className  = 'status-msg denied';
  msg.textContent = `// ${text}`;
  input.classList.add('error');
  setTimeout(() => input.classList.remove('error'), 500);
  input.value = '';
  input.focus();
}

function showGranted(msg, input, redirect) {
  msg.className  = 'status-msg granted';
  msg.textContent = '// ACCESS GRANTED — REDIRECTING TO SECURE FILE...';
  input.classList.add('success');
  input.disabled = true;
  document.getElementById('submitBtn').disabled = true;

  // Animate progress bar
  const bar  = document.getElementById('redirectBar');
  const fill = document.getElementById('redirectFill');
  bar.classList.add('active');

  const DELAY = 3000; // ms before redirect
  fill.style.transition = `width ${DELAY}ms linear`;
  setTimeout(() => fill.style.width = '100%', 50);
  setTimeout(() => { window.location.href = redirect; }, DELAY);
}

// Enter key support
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkCode();
});

// ── Background atmosphere text ────────────────────────────
const FILLER = 'TIER3 RESTRICTED ACCESS DENIED CLEARANCE REQUIRED AUTHORIZATION FAILED SESSION LOGGED SECURE NODE GSC INTERNAL ';
const bg = document.getElementById('bgText');
bg.textContent = (FILLER.repeat(200));

// ── Session stamp ─────────────────────────────────────────
document.getElementById('sessionStamp').textContent =
  'SESSION: SES-' + Math.random().toString(36).substring(2, 8).toUpperCase();

// ── Clock ─────────────────────────────────────────────────
function updateTime() {
  const t = new Date().toLocaleString('en-GB', { hour12: false });
  document.getElementById('clockStamp').textContent  = t;
  document.getElementById('bottomTime').textContent  = t;
}
updateTime(); setInterval(updateTime, 1000);
</script>
</body>
  </html>
